{% extends 'base.html' %}

{% block content %}

<h1
    style="
        margin-bottom:20px;
        color:#5a4fcf;
    "
>
    📸 Photo Albums
</h1>

<a
    href="/create/"
    style="
        display:inline-block;
        margin-bottom:25px;
        background:#5a4fcf;
        color:white;
        padding:12px 20px;
        border-radius:10px;
        text-decoration:none;
        font-weight:bold;
    "
>
    + Create Album
</a>

<div
    style="
        display:grid;
        grid-template-columns:repeat(auto-fit, minmax(300px, 1fr));
        gap:20px;
    "
>

{% for album in object_list %}

    <div
        style="
            background:white;
            border-radius:15px;
            overflow:hidden;
            box-shadow:0 4px 15px rgba(0,0,0,0.1);
        "
    >

        {% if album.image %}

        <img
            src="{{ album.image.url }}"
            alt="{{ album.title }}"
            style="
                width:100%;
                height:250px;
                object-fit:cover;
            "
        >

        {% endif %}

        <div style="padding:15px;">

            <h3>
                {{ album.title }}
            </h3>

            <p
                style="
                    color:gray;
                    margin-top:10px;
                    font-size:14px;
                "
            >
                {{ album.created_at }}
            </p>

        </div>

    </div>

{% empty %}

    <p>No albums uploaded yet.</p>

{% endfor %}

</div>

{% endblock %}
