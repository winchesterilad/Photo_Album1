<!-- templates/base.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Photo Album</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: linear-gradient(to right, #667eea, #764ba2);
            min-height:100vh;
            color:#333;
        }

        .container{
            width:90%;
            max-width:1100px;
            margin:40px auto;
        }

        .navbar{
            background:white;
            padding:20px 30px;
            border-radius:15px;
            display:flex;
            justify-content:space-between;
            align-items:center;
            box-shadow:0 8px 20px rgba(0,0,0,0.15);
        }

        .logo{
            font-size:28px;
            font-weight:bold;
            color:#5a4fcf;
        }

        .nav-links{
            display:flex;
            gap:15px;
            align-items:center;
        }

        .nav-links a{
            text-decoration:none;
            background:#5a4fcf;
            color:white;
            padding:10px 18px;
            border-radius:8px;
            transition:0.3s;
            font-weight:bold;
        }

        .nav-links a:hover{
            background:#4338ca;
            transform:translateY(-2px);
        }

        .welcome{
            margin-right:10px;
            font-weight:bold;
            color:#444;
        }

        .content{
            margin-top:30px;
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 8px 20px rgba(0,0,0,0.15);
        }

        .hero{
            text-align:center;
            padding:50px 20px;
        }

        .hero h1{
            font-size:48px;
            color:white;
            margin-bottom:15px;
        }

        .hero p{
            font-size:18px;
            color:#f1f1f1;
        }

        .logout-form{
            display:inline;
        }

        .logout-btn{
            background:#e63946;
            color:white;
            border:none;
            padding:10px 18px;
            border-radius:8px;
            cursor:pointer;
            font-weight:bold;
            transition:0.3s;
        }

        .logout-btn:hover{
            background:#c1121f;
            transform:translateY(-2px);
        }

        @media(max-width:768px){

            .navbar{
                flex-direction:column;
                gap:15px;
            }

            .nav-links{
                flex-wrap:wrap;
                justify-content:center;
            }

            .hero h1{
                font-size:36px;
            }
        }

    </style>
</head>
<body>

    <div class="container">

        <div class="hero">

            <h1>📸 Photo Album System</h1>

            <p>
                Create beautiful memories and organize your albums easily.
            </p>

        </div>

        <div class="navbar">

            <div class="logo">
                Photo Album
            </div>

            {% if user.is_authenticated %}

            <div class="nav-links">

                <span class="welcome">
                    Welcome, {{ user.username }}
                </span>

                <a href="/">
                    Home
                </a>

                <a href="/create/">
                    Create Album
                </a>

                <!-- FIXED LOGOUT -->

                <form
                    action="/logout/"
                    method="post"
                    class="logout-form"
                >

                    {% csrf_token %}

                    <button
                        type="submit"
                        class="logout-btn"
                    >
                        Logout
                    </button>

                </form>

            </div>

            {% else %}

            <div class="nav-links">

                <a href="/login/">
                    Login
                </a>

                <a href="/register/">
                    Register
                </a>

            </div>

            {% endif %}

        </div>

        <div class="content">

            {% block content %}
            {% endblock %}

        </div>

    </div>

</body>
</html>
