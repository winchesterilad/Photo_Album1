<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Register</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .container{
            width:100%;
            max-width:420px;
            background:white;
            padding:40px;
            border-radius:20px;
            box-shadow:0 10px 30px rgba(0,0,0,0.2);
        }

        .title{
            text-align:center;
            margin-bottom:30px;
        }

        .title h1{
            color:#5a4fcf;
            margin-bottom:10px;
        }

        .title p{
            color:#777;
            font-size:14px;
        }

        form{
            margin-top:20px;
        }

        form p{
            margin-bottom:18px;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
            color:#444;
        }

        input{
            width:100%;
            padding:12px;
            border:1px solid #ccc;
            border-radius:10px;
            outline:none;
            font-size:15px;
            transition:0.3s;
        }

        input:focus{
            border-color:#5a4fcf;
            box-shadow:0 0 8px rgba(90,79,207,0.3);
        }

        .btn{
            width:100%;
            padding:13px;
            border:none;
            border-radius:10px;
            background:#5a4fcf;
            color:white;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
            transition:0.3s;
        }

        .btn:hover{
            background:#4338ca;
            transform:translateY(-2px);
        }

        .bottom-text{
            text-align:center;
            margin-top:20px;
            color:#666;
        }

        .bottom-text a{
            color:#5a4fcf;
            text-decoration:none;
            font-weight:bold;
        }

        .bottom-text a:hover{
            text-decoration:underline;
        }

        .icon{
            font-size:50px;
            margin-bottom:10px;
        }

        @media(max-width:500px){
            .container{
                margin:20px;
                padding:30px 25px;
            }
        }
    </style>

</head>
<body>

    <div class="container">

        <div class="title">
            <div class="icon">📸</div>
            <h1>Welcome Back</h1>
            <p>Login to your Photo Album account</p>
        </div>

        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            <button type="submit" class="btn">
                Login
            </button>
        </form>

        <div class="bottom-text">
            Don't have an account?
            <a href="/register/">Create Account</a>
        </div>

    </div>

</body>
</html>
